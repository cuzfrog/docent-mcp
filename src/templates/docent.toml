# For E2E tests
[index]
embedding_model = "BGESmallENV15Q"    # embedding model to use for vector generation
persist_path    = "./.docent-index"   # directory to persist the index
chunk_size      = 512                 # max tokens per chunk
chunk_overlap   = 64                  # overlap between consecutive chunks
max_size_mb     = 512                 # issue warning if total index size exceeds this limit

[search.ranking]
same_src_score_decay = 0.9            # score multiplier for subsequent chunks from same source
file_hint_boost      = 1.5            # score multiplier for chunks matching the MCP file_hint parameter

[search.fusion]
strategy           = "rrf"           # rrf | weighted_sum | comb_sum | comb_mnz
rrf_k               = 60.0            # RRF k parameter
semantic_weight     = 0.7             # only used by weighted_sum strategy

[search.bm25]
k1                  = 1.2            # BM25 k1 parameter
b                   = 0.75           # BM25 b parameter

[server]
log_level = "debug"                   # debug | info | warn | error
port      = 7878                      # default 0 = random available port
