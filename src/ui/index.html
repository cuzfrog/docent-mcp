<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docent — DDR Search</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <header>
    <h1>docent</h1>
    <p class="subtitle">Design Decision Record Search — MCP Web UI</p>
  </header>

  <main class="layout">
    <div class="left-col">
      <div id="connection-status" class="status-connecting">
        Connecting to MCP server…
      </div>

      <form id="search-form" class="search-box">
        <div class="input-row">
          <input
            type="text"
            id="query"
            placeholder="Ask a question about a design decision…"
            required
            autofocus
            disabled
          >
          <select id="limit" disabled>
            <option value="3">3 results</option>
            <option value="5">5 results</option>
            <option value="10">10 results</option>
          </select>
          <button type="submit" id="search-btn" disabled>Search</button>
        </div>
      </form>

      <div id="results">
        <div class="result-placeholder">
          Enter a query above to search Design Decision Records.
        </div>
      </div>
    </div>

    <div class="right-col">
      <div id="raw-response">
        <div class="raw-header">
          <span>Raw MCP Response</span>
          <button id="copy-raw">Copy</button>
        </div>
        <pre id="raw-content"></pre>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
