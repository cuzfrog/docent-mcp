<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>docent — DDR Search</title>
  <link rel="stylesheet" href="/ui/app.css">
</head>
<body>
  <header>
    <h1>docent</h1>
    <p class="subtitle">Design Decision Record Search — MCP Web UI</p>
  </header>

  <main class="layout">
    <div class="left-col">
      <section id="status-section">
        <div id="connection-status" class="status-connecting" aria-live="polite">
          Connecting to MCP server…
        </div>
      </section>

      <section id="search-section">
        <form id="search-form" class="search-box">
          <div class="input-row">
            <label for="query">Search query</label>
            <input
              type="text"
              id="query"
              placeholder="Ask a question about a design decision…"
              required
              autofocus
              disabled
            >
            <label for="limit">Max results</label>
            <select id="limit" disabled>
              <option value="3">3 results</option>
              <option value="5">5 results</option>
              <option value="10">10 results</option>
            </select>
            <button type="submit" id="search-btn" disabled>Search</button>
          </div>
        </form>
      </section>

      <section id="results-section" aria-busy="false">
        <div id="results">
        </div>
      </section>
    </div>

    <div class="right-col">
      <section id="debug-section">
          <div id="tool-info"></div>
          <div id="raw-response">
            <div class="raw-header">
              <span>Raw MCP Response</span>
              <button id="copy-raw">Copy</button>
            </div>
            <pre id="raw-content"></pre>
          </div>
      </section>
    </div>
  </main>

  <template id="result-card-template">
    <div class="result-card">
      <div class="result-title-line">
        <span class="result-kind-badge"></span>
        <span class="result-title"></span>
        <span class="result-score"></span>
      </div>
      <div class="result-source-line">
        <span class="result-source"></span>
        <span class="result-lines"></span>
        <span class="result-freshness"></span>
        <button class="copy-link-btn">Copy link</button>
      </div>
      <div class="result-meta">
        <span class="result-section"></span>
      </div>
      <div class="result-content-wrapper">
        <div class="result-content"></div>
        <button class="copy-content-btn">Copy content</button>
      </div>
      <div class="result-footer">
        <span class="result-footer-text"></span>
      </div>
    </div>
  </template>

  <template id="error-card-template">
    <div class="error-card"><span class="error-message"></span></div>
  </template>

  <template id="placeholder-template">
    <div class="result-placeholder">Enter a query above to search Design Decision Records.</div>
  </template>

  <script type="module" src="/ui/app.js"></script>
</body>
</html>
